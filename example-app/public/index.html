<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment Submission System</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>"
    />
  </head>
  <body>
    <!-- ===================== LOGIN ===================== -->
    <main id="login-view" class="login-wrap">
      <form id="login-form" class="card login-card">
        <div class="login-logo">📚</div>
        <h1>Assignment Portal</h1>
        <p class="muted">Sign in to view and submit your coursework.</p>

        <label for="login-name">Your name</label>
        <input
          id="login-name"
          type="text"
          placeholder="e.g. Jane Doe"
          autocomplete="name"
          required
        />

        <label>I am a…</label>
        <div class="role-toggle">
          <input type="radio" name="role" id="role-student" value="student" checked />
          <label for="role-student">🎓 Student</label>
          <input type="radio" name="role" id="role-instructor" value="instructor" />
          <label for="role-instructor">🧑‍🏫 Instructor</label>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Continue</button>
        <p id="login-error" class="error-text" hidden></p>
      </form>
    </main>

    <!-- ===================== APP ===================== -->
    <div id="app-view" hidden>
      <header class="topbar">
        <div class="brand">📚 <span>Assignment Portal</span></div>
        <div class="topbar-right">
          <span id="who" class="who"></span>
          <button id="logout-btn" class="btn btn-ghost">Log out</button>
        </div>
      </header>

      <main class="container">
        <!-- Instructor: create-assignment toolbar -->
        <section id="instructor-tools" class="toolbar" hidden>
          <h2 class="page-title">Assignments</h2>
          <button id="new-assignment-btn" class="btn btn-primary">+ New assignment</button>
        </section>

        <h2 id="student-title" class="page-title" hidden>Your Assignments</h2>

        <div id="content"><!-- cards rendered here --></div>
        <p id="empty-state" class="empty" hidden></p>
      </main>
    </div>

    <!-- ===================== MODAL ===================== -->
    <div id="modal-backdrop" class="modal-backdrop" hidden>
      <div class="modal card" role="dialog" aria-modal="true">
        <div class="modal-head">
          <h3 id="modal-title">Title</h3>
          <button id="modal-close" class="icon-btn" aria-label="Close">✕</button>
        </div>
        <div id="modal-body" class="modal-body"></div>
      </div>
    </div>

    <!-- toast notifications -->
    <div id="toast" class="toast" hidden></div>

    <script src="app.js"></script>
  </body>
</html>
